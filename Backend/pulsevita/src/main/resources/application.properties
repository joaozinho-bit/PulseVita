spring.application.name=pulsevita

# inclui a mensagem das ResponseStatusException no corpo do erro,
# para o frontend mostrar o motivo real (ex.: sem dispositivo associado)
server.error.include-message=always

spring.datasource.url=jdbc:postgresql://localhost:5432/springdb
spring.datasource.username=springuser
spring.datasource.password=springpass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.properties.hibernate.default_schema=pulsevita

# Lax chega: localhost:5500 -> localhost:8080 e same-site (a porta nao conta).
# secure=true nao pode ser usado porque a app Android fala com o backend por
# http://<ip do pc> e cookies Secure sao descartados fora de HTTPS/localhost.
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false

# MQTT
mqtt.broker.url=tcp://192.168.1.10:1883
# mqtt.broker.url=tcp://10.169.110.231:1883
mqtt.topic.leituras=pulsevita/leituras
mqtt.topic.login=pulsevita/login
mqtt.client.id=spring-pulsevita

#Foto de perfil
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads
spring.application.name=pulsevita

spring.datasource.url=jdbc:postgresql://localhost:5432/springdb
spring.datasource.username=springuser
spring.datasource.password=springpass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.properties.hibernate.default_schema=pulsevita

server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true

# MQTT
# mqtt.broker.url=tcp://192.168.1.10:1883
mqtt.broker.url=tcp://10.169.110.231:1883
mqtt.topic.leituras=pulsevita/leituras
mqtt.client.id=spring-pulsevita

#Foto de perfil
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../Imagens/Icon app.png">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/toast.css">
    <title>Pagina de Login</title>
</head>

<body>
    <div class="div-logo">
        <img class="logo" src="../Imagens/Logo.png" alt="PulseVita">
    </div>

    <div class="container">
        <div class="first">
            <h1>Bem Vindo(a)!</h1>
            <input id="email-input" class="email" type="text" placeholder="E-mail">
            <input id="senha-input" class="senha" type="password" placeholder="Senha">
            <div class="link-clique">
                <p>Ainda não possui uma conta? <a href="pages/signup.html">Clique aqui</a></p>
            </div>
            <button id="btn-entrar" class="entrar">Entrar</button>
        </div>

        <div class="second">
            <img src="../Imagens/PulseVita-para-Login.png" alt="PulseVita">
        </div>
    </div>
</body>
<script src="js/toast.js"></script>

<script>
    document.getElementById('btn-entrar').addEventListener('click', async function () {
        const emailValue = document.getElementById('email-input').value;
        const senhaValue = document.getElementById('senha-input').value;

        try {
            const resposta = await fetch('http://localhost:8080/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: emailValue, senha: senhaValue })
            });

            if (resposta.ok) {
                const dados = await resposta.json();
                localStorage.setItem('utilizador', JSON.stringify(dados));
                window.location.href = 'pages/dashboard.html';
            } else {
                toast.error("Email ou senha inválidos.");
            }
        } catch (erro) {
            toast.error("Não foi possível contactar o servidor.");
        }
    });
</script>

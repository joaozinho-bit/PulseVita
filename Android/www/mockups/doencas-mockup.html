<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - As minhas doenças</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde-escuro: #205236;
            --verde: #138C6E;
            --verde-vivo: #34C759;
            --cyan: #B6E5E5;
            --amarelo: #FFD166;
            --laranja: #C77700;
        }

        .conteudo {
            padding: 15px;
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 16px;
        }

        .cabecalho h1 {
            color: #fff;
            font-size: 1.5rem;
        }

        .subtitulo {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.85rem;
            margin-top: 2px;
        }

        /* Pesquisa por nome: util quando a lista cresce, discreta quando nao */
        .pesquisa {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            border-radius: 12px;
            padding: 11px 14px;
        }

        .pesquisa i {
            color: var(--verde);
            font-size: 17px;
        }

        .pesquisa input {
            flex: 1;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--verde-escuro);
            background: transparent;
        }

        .chips-estado {
            display: flex;
            gap: 8px;
        }

        .chip-filtro {
            flex: 1;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.9);
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 8px 10px;
            border-radius: 999px;
            cursor: pointer;
            transition: transform 0.08s ease;
        }

        .chip-filtro:active {
            transform: scale(0.96);
        }

        .chip-filtro.ativo {
            background: var(--cyan);
            color: var(--verde-escuro);
            border-color: var(--cyan);
        }

        .lista {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Cartao de doenca */
        .cartao {
            display: flex;
            gap: 14px;
            background: #fff;
            border-radius: 16px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.10);
            border-left: 5px solid var(--verde-vivo);
        }

        .cartao.terminada {
            border-left-color: #c2c8c5;
        }

        .icone {
            flex-shrink: 0;
            width: 46px;
            height: 46px;
            border-radius: 12px;
            background: var(--cyan);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icone i {
            color: var(--verde);
            font-size: 22px;
        }

        .cartao.terminada .icone {
            background: #eef1f0;
        }

        .cartao.terminada .icone i {
            color: #9aa5a0;
        }

        .corpo {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .linha-topo {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .corpo h3 {
            color: var(--verde-escuro);
            font-size: 1rem;
            font-weight: 700;
        }

        .badge {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 999px;
            white-space: nowrap;
        }

        .badge-ativa { background: rgba(52, 199, 89, 0.16); color: #1e7d3f; }
        .badge-terminada { background: #eceeed; color: #7a827e; }

        .chips-linha {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 2px 9px;
            border-radius: 999px;
        }

        .chip-cronica {
            background: rgba(255, 209, 102, 0.25);
            color: var(--laranja);
        }

        .meta {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 1px;
        }

        .meta span {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            color: #6b7770;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .meta i {
            color: var(--verde);
            width: 15px;
        }

        .observacoes {
            color: #4a5a53;
            font-size: 0.83rem;
            line-height: 1.45;
            background: #f4f8f6;
            border-radius: 10px;
            padding: 9px 11px;
        }

        .vazio {
            text-align: center;
            color: rgba(255, 255, 255, 0.85);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .vazio i {
            font-size: 44px;
            color: var(--cyan);
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="menuToggle" onclick="abrirMenu()" aria-label="Abrir menu">
            <i class="bi bi-list"></i>
        </button>
        <div class="logo">
            <img class="logo" src="../Imagens/Logo.png" alt="PulseVita">
        </div>
        <div class="profile">
            <img class="img-user pronta" src="../Imagens/user.png" alt="Imagem de perfil">
            <span>Ana Martins</span>
        </div>
    </div>

    <div class="menuOverlay" id="menuOverlay" onclick="fecharMenu()"></div>

    <section class="container">
        <div class="esquerda" id="menuLateral">
            <div class="menu">
                <button class="menuFechar" onclick="fecharMenu()" aria-label="Fechar menu">
                    <i class="bi bi-x-lg"></i>
                </button>
                <ul>
                    <a href="#"><li class="menu-links"><i class="bi bi-grid"></i><p>Dashboard</p></li></a>
                    <a href="#"><li class="menu-links"><i class="bi bi-calendar-check"></i><p>Marcações</p></li></a>
                    <a href="#"><li class="menu-links"><i class="bi bi-heart-pulse"></i><p>Medições</p></li></a>
                    <a href="#"><li class="menu-links"><i class="bi bi-clipboard2-pulse"></i><p>Dados Médicos</p></li></a>
                    <a href="#"><li class="menu-links active"><i class="bi bi-virus"></i><p>As minhas doenças</p></li></a>
                    <a href="#"><li class="menu-links"><i class="bi bi-calendar-plus"></i><p>Marcar Consulta</p></li></a>
                    <a href="#"><li class="menu-links"><i class="bi bi-question-circle"></i><p>FAQ</p></li></a>
                    <a href="#"><li class="menu-links"><i class="bi bi-gear"></i><p>Definições</p></li></a>
                </ul>
            </div>
            <div class="btn-sair">
                <a href="#"><p class="sair">Sair</p></a>
            </div>
        </div>

        <div class="direita">
            <div class="conteudo">
                <div class="cabecalho">
                    <h1>As minhas doenças</h1>
                    <p class="subtitulo">Condições clínicas associadas ao seu perfil</p>
                </div>

                <div class="pesquisa">
                    <i class="bi bi-search"></i>
                    <input type="text" id="pesquisa" placeholder="Procurar por nome da doença">
                </div>

                <div class="chips-estado" id="chipsEstado">
                    <button class="chip-filtro ativo" data-estado="">Todas</button>
                    <button class="chip-filtro" data-estado="ativa">Ativas</button>
                    <button class="chip-filtro" data-estado="terminada">Terminadas</button>
                </div>

                <div id="lista" class="lista"></div>
            </div>
        </div>
    </section>

    <script>
        function abrirMenu() {
            document.getElementById("menuLateral").classList.add("aberto");
            document.getElementById("menuOverlay").classList.add("aberto");
            document.body.style.overflow = "hidden";
        }
        function fecharMenu() {
            document.getElementById("menuLateral").classList.remove("aberto");
            document.getElementById("menuOverlay").classList.remove("aberto");
            document.body.style.overflow = "";
        }

        // ===== Dados mockados (sem backend) =====
        // dataFim a null significa doenca ainda ativa/em curso
        const DOENCAS = [
            { nome: "Hipertensão Arterial", dataDiagnostico: "2022-03-08", dataFim: null, medico: "Dr. Carlos Pinto", cronica: true, observacoes: "Pressão arterial elevada. Requer monitorização regular e medicação contínua." },
            { nome: "Bradicardia Sinusal", dataDiagnostico: "2023-05-12", dataFim: null, medico: "Dr. Carlos Pinto", cronica: true, observacoes: "Frequência cardíaca inferior ao normal em repouso." },
            { nome: "Pneumonia", dataDiagnostico: "2024-11-02", dataFim: "2024-11-20", medico: "Dr. Miguel Sousa", cronica: false, observacoes: "Episódio agudo tratado com antibiótico. Sem sequelas." },
            { nome: "Gripe", dataDiagnostico: "2025-01-15", dataFim: "2025-01-25", medico: "Dra. Sofia Nunes", cronica: false, observacoes: "Infeção viral com febre. Recuperação completa." },
        ];

        const MESES = ["jan", "fev", "mar", "abr", "mai", "jun", "jul", "ago", "set", "out", "nov", "dez"];

        function formatarData(iso) {
            const [a, m, d] = iso.split("-").map(Number);
            return `${String(d).padStart(2, "0")} ${MESES[m - 1]} ${a}`;
        }

        // icone escolhido pela area clinica, para leitura mais rapida
        function iconeDoenca(nome) {
            const n = nome.toLowerCase();
            if (n.includes("pneumonia") || n.includes("gripe")) return "bi-lungs";
            if (n.includes("cardia") || n.includes("tensão") || n.includes("hipertensão") || n.includes("arritmia")) return "bi-heart-pulse";
            return "bi-clipboard2-pulse";
        }

        let filtroEstado = "";
        let termo = "";

        function estadoDoenca(d) {
            return d.dataFim ? "terminada" : "ativa";
        }

        function cartao(d) {
            const estado = estadoDoenca(d);
            const badge = estado === "ativa"
                ? `<span class="badge badge-ativa"><i class="bi bi-circle-fill" style="font-size:0.5rem"></i> Ativa</span>`
                : `<span class="badge badge-terminada"><i class="bi bi-check2"></i> Terminada</span>`;
            const cronica = d.cronica
                ? `<span class="chip chip-cronica"><i class="bi bi-arrow-repeat"></i> Crónica</span>` : "";
            const fim = d.dataFim
                ? `<span><i class="bi bi-calendar-check"></i> Terminada em ${formatarData(d.dataFim)}</span>` : "";
            const obs = d.observacoes
                ? `<p class="observacoes">${d.observacoes}</p>` : "";

            return `
                <article class="cartao ${estado}">
                    <div class="icone"><i class="bi ${iconeDoenca(d.nome)}"></i></div>
                    <div class="corpo">
                        <div class="linha-topo">
                            <h3>${d.nome}</h3>
                            ${badge}
                        </div>
                        ${cronica ? `<div class="chips-linha">${cronica}</div>` : ""}
                        <div class="meta">
                            <span><i class="bi bi-calendar-event"></i> Diagnóstico: ${formatarData(d.dataDiagnostico)}</span>
                            ${fim}
                            <span><i class="bi bi-person-badge"></i> ${d.medico}</span>
                        </div>
                        ${obs}
                    </div>
                </article>`;
        }

        function render() {
            const lista = DOENCAS.filter(d => {
                if (filtroEstado && estadoDoenca(d) !== filtroEstado) return false;
                if (termo && !d.nome.toLowerCase().includes(termo)) return false;
                return true;
            });

            const cont = document.getElementById("lista");
            if (lista.length === 0) {
                cont.innerHTML = `
                    <div class="vazio">
                        <i class="bi bi-clipboard2-check"></i>
                        <p>Nenhuma doença corresponde à pesquisa.</p>
                    </div>`;
                return;
            }
            cont.innerHTML = lista.map(cartao).join("");
        }

        document.getElementById("chipsEstado").addEventListener("click", (e) => {
            const btn = e.target.closest(".chip-filtro");
            if (!btn) return;
            document.querySelectorAll(".chip-filtro").forEach(c => c.classList.remove("ativo"));
            btn.classList.add("ativo");
            filtroEstado = btn.dataset.estado;
            render();
        });

        document.getElementById("pesquisa").addEventListener("input", (e) => {
            termo = e.target.value.trim().toLowerCase();
            render();
        });

        render();
    </script>
</body>
</html>

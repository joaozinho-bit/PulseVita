<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../Imagens/Icon app.png">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/dashboard.css">

    <!-- Font montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cinzel:wght@400..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <title>Dashboard do Utilizador</title>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <img class="logo" src="../../Imagens/Logo.png" alt="PulseVita">
        </div>
        <div class="profile">
            <img class="img-user" src="../../Imagens/user.png" alt="Imagem de perfil">
            <span id="nome-utilizador">...</span>
            <img class="point" src="../../Imagens/PontoVerde.png" alt="">
        </div>
    </div>

    <!-- Conteudo -->
    <div class="esquerda">
        <div class="menu">
            <ul>
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">Marcações</a></li>
                <li><a href="#">Resultados</a></li>
                <li><a href="#">Contactar-nos</a></li>
                <li><a href="#">Sincronizar</a></li>
                <li><a href="#">Definições</a></li>
                <a href="../index.html">Sair</a>
            </ul>
        </div>
    </div>

    <script>
    const dados = JSON.parse(localStorage.getItem('utilizador'));
    if (!dados) {
        window.location.href = '../index.html';
    } else {
        document.getElementById('nome-utilizador').textContent = dados.nomeCompleto;
    }
    </script>
    
</body>
</html>

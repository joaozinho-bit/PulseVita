<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../Imagens/Icon app.png">
    <link rel="stylesheet" href="../css/signup.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/toast.css">
    <link rel="stylesheet" href="../css/loader.css">
    <title>Pagina de Signup</title>
  <script src="../js/config.js"></script>
</head>
<body>
    <div class="div-logo">
        <img class="logo" src="../Imagens/Logo.png" alt="PulseVita">
    </div>

    <div class="container">
        <div class="first">
            <img src="../Imagens/PulseVita-para-Login.png" alt="PulseVita">
        </div>

        <div class="second">
            <h1>Criar Conta</h1>
            <input id="nome-input" class="nome" type="text" placeholder="Nome e sobrenome">
            <input id="email-input" class="email" type="text" placeholder="E-mail">
            <input id="senha-input" class="senha" type="password" placeholder="Senha">
            <div class="link-clique">
                <p>Já possui uma conta? <a href="../index.html">Clique aqui</a></p>
            </div>
            <button id="btn-registar" class="entrar">Criar Conta</button>
        </div>
    </div>
    <script src="../js/toast.js"></script>
    <script>
        document.getElementById('btn-registar').addEventListener('click', async function() {
            const nome = document.getElementById('nome-input').value;
            const email = document.getElementById('email-input').value;
            const senha = document.getElementById('senha-input').value;

            if (!nome || !email || !senha) {
                toast.warning("Preenche todos os campos!");
                return;
            }

            const reporBotao = ativarLoaderBotao(this);

            try {
                const resposta = await fetch(API_BASE_URL + '/users/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nomeCompleto: nome, email: email, senha: senha })
                });

                if (resposta.ok) {
                    window.location.href = '../index.html';
                    return;
                }
                toast.warning("Este email já está registado!");
            } catch (erro) {
                toast.error("Não foi possível contactar o servidor.");
            }
            reporBotao();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../../Imagens/Icon app.png">
    <link rel="stylesheet" href="../css/signup.css">
    <title>Pagina de Signup</title>
</head>
<body>
    <div class="div-logo">
        <img class="logo" src="../../Imagens/Logo.png" alt="PulseVita">
    </div>

    <div class="container">
        <div class="first">
            <img src="../../Imagens/PulseVita-para-Login.png" alt="PulseVita">
        </div>

        <div class="second">
            <h1>Bem Vindo(a)!</h1>
            <input class="nome" type="text" placeholder="Nome e sobrenome">
            <input class="email" type="text" placeholder="E-mail">
            <input class="senha" type="password" placeholder="Senha">
            <div class="link-clique">
                <p>Já possui uma conta? <a href="../index.html">Clique aqui</a></p>
            </div>
            <button class="entrar">Entrar</button>
        </div>
    </div>
</body>
</html>

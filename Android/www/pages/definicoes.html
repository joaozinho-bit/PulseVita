<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/x-icon" href="../../Imagens/Icon app.png">

        <!-- CSS -->
        <link rel="stylesheet" href="../css/definicoes.css">
        <link rel="stylesheet" href="../css/global.css">

        <!-- Font montserrat -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cinzel:wght@400..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        
        <title>Dashboard do Utilizador</title>
    </head>
    <body>
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <img class="logo" src="../../Imagens/Logo.png" alt="PulseVita">
            </div>
            <div class="profile">
                <img class="img-user" src="../../Imagens/user.png" alt="Imagem de perfil">
                <span>Pedro Silva</span>
                <img class="point" src="../../Imagens/PontoVerde.png" alt="">
            </div>
        </div>

        <!-- Conteudo -->
        <section class="container">
            <div class="esquerda">
                <div class="menu">
                    <ul>
                        <a href="dashboard.html">
                            <li class="menu-links">
                                <img src="../../Imagens/icon-dashboard.png" alt="">
                                <p>Dashboard</p>
                            </li>
                        </a>

                        <a href="marcacoes.html">
                            <li class="menu-links">
                                <img src="../../Imagens/icon-marcacoes.png" alt="">
                                <p>Marcações</p>
                            </li>
                        </a>
                        
                        <a href="resultados.html">
                            <li class="menu-links">
                                <img src="../../Imagens/icon-resultados.png" alt="">
                                <p>Resultados</p>
                            </li>
                        </a>

                        <a href="marcarconsulta.html">
                            <li class="menu-links">
                                <img src="../../Imagens/icon-marcarconsulta.png" alt="">
                                <p>Marcar Consulta</p>
                            </li>
                        </a>
                        
                        <a href="contactar.html">
                            <li class="menu-links">
                                <img src="../../Imagens/icon-contactar.png" alt="">
                                <p>Contactar-nos</p>
                            </li>
                        </a>
                        <a href="sincronizar.html">
                            <li class="menu-links">
                                <img src="../../Imagens/icon-sync.png" alt="">
                                <p>Sincronizar</p>
                            </li>
                        </a>
                        <a href="definicoes.html">
                            <li class="menu-links">
                                <img src="../../Imagens/icon-definicoes.png" alt="">
                                <p>Definições</p>
                            </li>
                        </a>
                    </ul>
                    <div class="btn-sair">
                        <a href="../index.html">        
                            <p class="sair">Sair</p>
                        </a>
                    </div>
                </div>
            </div>
            <div class="direita">
                <div class="conteudo">
                    <div class="info-pessoal">
                        <div class="foto">
                            <img src="../../Imagens/user.png" alt="">
                        </div>
                        <div class="lista-info">
                            <div class="dados">
                                <img class="icon" src="../../Imagens/user.png" alt="">
                                <p class="nome" id="nome">Pedro Silva</p>
                                <button id="edit-nome" class="edit-btn">
                                    <img src="../../Imagens/icon-lapis.png" alt="">
                                </button>
                            </div>
                            <div class="dados">
                                <img class="icon" src="../../Imagens/icon-tel.png" alt="">
                                <p class="telefone" id="telefone">123 456 789</p>
                                <button id="edit-telefone" class="edit-btn">
                                    <img src="../../Imagens/icon-lapis.png" alt="">
                                </button>
                            </div>
                            <div class="dados">
                                <img class="icon" src="../../Imagens/icon-mail.png" alt="">
                                <p class="email" id="email">pedro@gmail.com</p>
                                <button id="edit-email" class="edit-btn">
                                    <img src="../../Imagens/icon-lapis.png" alt="">
                                </button>
                            </div>
                            <div class="dados">
                                <img class="icon" src="../../Imagens/icon-cruz.png" alt="">
                                <p class="num-utente" id="num-utente">123456789</p>
                                <button id="edit-num-utente" class="edit-btn">
                                    <img src="../../Imagens/icon-lapis.png" alt="">
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <script>
    const user = JSON.parse(localStorage.getItem('utilizador'));
    if (!user) window.location.href = '../index.html';

    const campos = [
        { btnId: 'edit-nome',       elemId: 'nome',       campo: 'nomeCompleto' },
        { btnId: 'edit-telefone',   elemId: 'telefone',   campo: 'telefone' },
        { btnId: 'edit-email',      elemId: 'email',       campo: 'email' },
        { btnId: 'edit-num-utente', elemId: 'num-utente', campo: 'numUtente' }
    ];

    // Preenche os dados
    campos.forEach(({ elemId, campo }) => {
        document.getElementById(elemId).textContent = user[campo] || 'N/A';
    });
    document.querySelector('.profile span').textContent = user.nomeCompleto || 'Utilizador';

    function ativarEdicao({ btnId, elemId, campo }) {
        document.getElementById(btnId).addEventListener('click', () => {
            const p = document.getElementById(elemId);
            const input = Object.assign(document.createElement('input'), {
                type: 'text', value: p.textContent === 'N/A' ? '' : p.textContent, className: 'input-inline'
            });
            const btnGuardar = Object.assign(document.createElement('button'), {
                textContent: '✓', className: 'btn-guardar-inline'
            });

            p.replaceWith(input);
            document.getElementById(btnId).replaceWith(btnGuardar);
            input.focus();

            async function guardar() {
                const res = await fetch(`http://localhost:8080/users/${user.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ [campo]: input.value.trim() })
                });
                if (!res.ok) return alert('Erro ao guardar.');

                Object.assign(user, await res.json());
                localStorage.setItem('utilizador', JSON.stringify(user));

                const novop = Object.assign(document.createElement('p'), {
                    id: elemId, textContent: user[campo] || 'N/A'
                });
                const novoBtn = document.createElement('button');
                novoBtn.id = btnId; novoBtn.className = 'edit-btn';
                novoBtn.innerHTML = '<img src="../../Imagens/icon-lapis.png" alt="">';

                input.replaceWith(novop);
                btnGuardar.replaceWith(novoBtn);
                ativarEdicao({ btnId, elemId, campo });

                if (campo === 'nomeCompleto')
                    document.querySelector('.profile span').textContent = user[campo];
            }

            btnGuardar.addEventListener('click', guardar);
            input.addEventListener('keydown', e => e.key === 'Enter' && guardar());
        });
    }

    campos.forEach(ativarEdicao);
</script>
    </body>
</html>

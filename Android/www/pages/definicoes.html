<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
        <link rel="icon" type="image/x-icon" href="../../Imagens/Icon app.png">

        <!-- CSS -->
        <link rel="stylesheet" href="../css/definicoes.css">
        <link rel="stylesheet" href="../css/global.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

        <!-- Font montserrat -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cinzel:wght@400..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        
        <title>Dashboard do Paciente</title>
    </head>
    <body>
        <!-- Header fixo -->
        <div class="header">
            <button class="menuToggle" id="menuToggle" onclick="abrirMenu()" aria-label="Abrir menu">
                <i class="bi bi-list"></i>
            </button>
            <img class="logo" src="../../Imagens/Logo.png" alt="PulseVita">
            <div class="profile">
                <img class="img-user" id="header-foto" src="../../Imagens/user.png" alt="Imagem de perfil">
                <span>Pedro Silva</span>
                <img class="point" src="../../Imagens/PontoVerde.png" alt="">
            </div>
        </div>

        <!-- Overlay do menu -->
        <div class="menuOverlay" id="menuOverlay" onclick="fecharMenu()"></div>

        <!-- Conteudo -->
        <section class="container">
            <!-- Menu lateral (fullscreen em mobile) -->
            <div class="esquerda" id="menuLateral">
                <div class="menu">
                    <button class="menuFechar" onclick="fecharMenu()" aria-label="Fechar menu">
                        <i class="bi bi-x-lg"></i>
                    </button>
                    <ul>
                        <a href="dashboard.html">
                            <li class="menu-links">
                                <img src="../../Imagens/icon-dashboard.png" alt="">
                                <p>Dashboard</p>
                            </li>
                        </a>

                        <a href="marcacoes.html">
                            <li class="menu-links">
                                <img src="../../Imagens/icon-marcacoes.png" alt="">
                                <p>Marcações</p>
                            </li>
                        </a>

                        <a href="resultados.html">
                            <li class="menu-links">
                                <img src="../../Imagens/icon-resultados.png" alt="">
                                <p>Resultados</p>
                            </li>
                        </a>

                        <a href="marcarconsulta.html">
                            <li class="menu-links">
                                <img src="../../Imagens/icon-marcarconsulta.png" alt="">
                                <p>Marcar Consulta</p>
                            </li>
                        </a>

                        <a href="contactar.html">
                            <li class="menu-links">
                                <img src="../../Imagens/icon-contactar.png" alt="">
                                <p>Contactar-nos</p>
                            </li>
                        </a>
                        <a href="sincronizar.html">
                            <li class="menu-links">
                                <img src="../../Imagens/icon-sync.png" alt="">
                                <p>Sincronizar</p>
                            </li>
                        </a>
                        <a href="definicoes.html">
                            <li class="menu-links active">
                                <img src="../../Imagens/icon-definicoes.png" alt="">
                                <p>Definições</p>
                            </li>
                        </a>
                    </ul>
                </div>
                <div class="btn-sair">
                    <a href="../index.html" id="btn-sair">
                        <p class="sair">Sair</p>
                    </a>
                </div>
            </div>

            <div class="direita">
                <div class="conteudo">
                    <h1>Definições</h1>
                    <div class="info-pessoal">

                        <!-- Foto clicável -->
                        <div class="foto" id="foto-wrapper">
                            <img id="foto-perfil" src="../../Imagens/user.png" alt="Foto de perfil">
                            <input type="file" id="input-foto" accept="image/*" style="display:none">
                            <div class="foto-overlay">
                                <img src="../../Imagens/icon-lapis.png" alt="Editar foto">
                            </div>
                        </div>

                        <div class="lista-info">

                            <div class="dados">
                                <img class="icon" src="../../Imagens/user.png" alt="">
                                <p class="campo-texto" id="nome">Pedro Silva</p>
                            </div>

                            <div class="dados">
                                <img class="icon" src="../../Imagens/icon-tel.png" alt="">
                                <p class="campo-texto" id="telefone">123 456 789</p>
                            </div>

                            <div class="dados">
                                <img class="icon" src="../../Imagens/icon-mail.png" alt="">
                                <p class="campo-texto" id="email">pedro@gmail.com</p>
                            </div>

                            <div class="dados">
                                <img class="icon" src="../../Imagens/icon-cruz.png" alt="">
                                <p class="campo-texto" id="n-paciente">123456789</p>
                            </div>

                            <div class="dados">
                                <img class="icon" src="../../Imagens/icon-genero.png" alt="">
                                <select class="edit-select" id="genero" disabled>
                                    <option value="Masculino" selected>Masculino</option>
                                    <option value="Feminino">Feminino</option>
                                </select>
                            </div>

                            <div class="dados">
                                <img class="icon" src="../../Imagens/icon-cruz.png" alt="">
                                <input class="edit-date" id="data-nasc" type="date" disabled>
                            </div>

                            <!-- Botões de ação -->
                            <div class="botoes-acao">
                                <button id="btn-editar" class="btn-editar" onclick="ativarEdicao()">
                                    <!-- <img src="../../Imagens/icon-lapis.png" alt="">--> Editar 
                                </button>
                                <div id="botoes-confirmacao" style="display:none; gap:10px;">
                                    <button class="btn-confirmar" onclick="confirmarEdicao()">✓ Confirmar</button>
                                    <button class="btn-cancelar" onclick="cancelarEdicao()">✗ Cancelar</button>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </section>

        <script>
    // Menu lateral (fullscreen): bloqueia o scroll do fundo enquanto esta aberto
    function abrirMenu() {
        document.getElementById("menuLateral").classList.add("aberto");
        document.getElementById("menuOverlay").classList.add("aberto");
        document.body.style.overflow = "hidden";
    }

    function fecharMenu() {
        document.getElementById("menuLateral").classList.remove("aberto");
        document.getElementById("menuOverlay").classList.remove("aberto");
        document.body.style.overflow = "";
    }

    // ─── Mapeamento género (frontend ↔ backend) ────────────────────
    const generoParaBackend = { 'Masculino': 'M', 'Feminino': 'F', 'Prefiro não dizer': 'P', 'Outro': 'O' };
    const generoParaFrontend = { 'M': 'Masculino', 'F': 'Feminino', 'P': 'Prefiro não dizer', 'O': 'Outro' };

    // ─── Foto de perfil ───────────────────────────────────────────
    const fotoWrapper = document.getElementById('foto-wrapper');
    const inputFoto   = document.getElementById('input-foto');
    const imgPerfil   = document.getElementById('foto-perfil');
    const headerFoto  = document.getElementById('header-foto');

    fotoWrapper.addEventListener('click', () => inputFoto.click());

    inputFoto.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            imgPerfil.src = ev.target.result;
            headerFoto.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });

    // Mapeamento campo HTML → chave no objeto user
    const camposConfig = [
        { elemId: 'nome',      campo: 'nomeCompleto' },
        { elemId: 'telefone',  campo: 'telefone'     },
        { elemId: 'email',     campo: 'email'        },
        { elemId: 'n-paciente',campo: 'n_paciente'   },
    ];

    let user = null;
    let valoresOriginais = {};

    (async function carregarPaciente() {
        try {
            const resp = await fetch('http://localhost:8080/users/me', { credentials: 'include' });
            if (!resp.ok) { window.location.href = '../index.html'; return; }
            user = await resp.json();
        } catch (erro) {
            window.location.href = '../index.html';
            return;
        }

        camposConfig.forEach(({ elemId, campo }) => {
            document.getElementById(elemId).textContent = user[campo] || 'N/A';
        });
        document.querySelector('.profile span').textContent = user.nomeCompleto || 'Paciente';
        document.getElementById('genero').value = generoParaFrontend[user.genero] || 'Masculino';
        document.getElementById('data-nasc').value = user.dataNascimento || '';
    })();

    function ativarEdicao() {
        camposConfig.forEach(({ elemId }) => {
            valoresOriginais[elemId] = document.getElementById(elemId).textContent;
        });
        valoresOriginais['genero']    = document.getElementById('genero').value;
        valoresOriginais['data-nasc'] = document.getElementById('data-nasc').value;

        camposConfig.forEach(({ elemId }) => {
            const p = document.getElementById(elemId);
            const input = document.createElement('input');
            input.type      = 'text';
            input.className = 'input-inline';
            input.id        = elemId;
            input.value     = p.textContent === 'N/A' ? '' : p.textContent;
            p.replaceWith(input);
        });

        document.getElementById('genero').disabled    = false;
        document.getElementById('data-nasc').disabled = false;

        document.getElementById('btn-editar').style.display         = 'none';
        document.getElementById('botoes-confirmacao').style.display = 'flex';
    }

    async function confirmarEdicao() {
        const payload = {};
        camposConfig.forEach(({ elemId, campo }) => {
            const input = document.getElementById(elemId);
            const novo  = input.value.trim();
            if (novo !== valoresOriginais[elemId]) payload[campo] = novo;
        });

        const novoGenero = document.getElementById('genero').value;
        const novaData   = document.getElementById('data-nasc').value;
        if (novoGenero !== valoresOriginais['genero']) payload['genero']   = generoParaBackend[novoGenero];
        if (novaData   !== valoresOriginais['data-nasc']) payload['dataNasc'] = novaData;

        if (Object.keys(payload).length > 0) {
            try {
                const res = await fetch(`http://localhost:8080/users/${user.id}`, {
                    method:  'PUT',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify(payload)
                });
                if (!res.ok) { alert('Erro ao guardar alterações.'); return; }
                user = await res.json();
            } catch (err) {
                alert('Não foi possível contactar o servidor.');
                return;
            }
        }

        camposConfig.forEach(({ elemId, campo }) => {
            const input = document.getElementById(elemId);
            const p     = document.createElement('p');
            p.className   = 'campo-texto';
            p.id          = elemId;
            p.textContent = user[campo] || input.value || 'N/A';
            input.replaceWith(p);
        });

        document.getElementById('genero').value    = generoParaFrontend[user.genero] || novoGenero;
        document.getElementById('data-nasc').value = user.dataNascimento || novaData;

        document.getElementById('genero').disabled    = true;
        document.getElementById('data-nasc').disabled = true;

        document.querySelector('.profile span').textContent = user.nomeCompleto || 'Paciente';

        document.getElementById('btn-editar').style.display         = 'flex';
        document.getElementById('botoes-confirmacao').style.display = 'none';
    }

    function cancelarEdicao() {
        camposConfig.forEach(({ elemId }) => {
            const input = document.getElementById(elemId);
            const p     = document.createElement('p');
            p.className   = 'campo-texto';
            p.id          = elemId;
            p.textContent = valoresOriginais[elemId];
            input.replaceWith(p);
        });

        document.getElementById('genero').value    = valoresOriginais['genero'];
        document.getElementById('genero').disabled = true;
        document.getElementById('data-nasc').value    = valoresOriginais['data-nasc'];
        document.getElementById('data-nasc').disabled = true;

        document.getElementById('btn-editar').style.display         = 'flex';
        document.getElementById('botoes-confirmacao').style.display = 'none';
    }

    document.getElementById('btn-sair').addEventListener('click', async function (e) {
        e.preventDefault();
        try {
            await fetch('http://localhost:8080/users/logout', {
                method: 'POST',
                credentials: 'include'
            });
        } catch (erro) {
        }
        window.location.href = '../index.html';
    });
</script>
    </body>
</html>

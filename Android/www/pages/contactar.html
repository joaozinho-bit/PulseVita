<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/x-icon" href="../Imagens/Icon app.png">


        <!-- CSS -->
        <link rel="stylesheet" href="../css/contactar.css">
        <link rel="stylesheet" href="../css/global.css">
        <link rel="stylesheet" href="../css/loader.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

        <!-- Font montserrat -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cinzel:wght@400..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        
        <title>Dashboard do Utilizador</title>
      <script src="../js/config.js"></script>
      <script src="../js/perfil.js"></script>
</head>
    <body>
        <!-- Header fixo -->
        <div class="header">
            <button class="menuToggle" id="menuToggle" onclick="abrirMenu()" aria-label="Abrir menu">
                <i class="bi bi-list"></i>
            </button>
            <div class="logo">
                <img class="logo" src="../Imagens/Logo.png" alt="PulseVita">
            </div>
            <div class="profile">
                <img class="img-user" id="header-foto" src="../Imagens/user.png" alt="Imagem de perfil">
                <span id="nome-paciente">Pedro Silva</span>
            </div>
        </div>

        <!-- Overlay do menu -->
        <div class="menuOverlay" id="menuOverlay" onclick="fecharMenu()"></div>

        <!-- Conteudo -->
        <section class="container">
            <!-- Menu lateral (fullscreen em mobile) -->
            <div class="esquerda" id="menuLateral">
                <div class="menu">
                    <button class="menuFechar" onclick="fecharMenu()" aria-label="Fechar menu">
                        <i class="bi bi-x-lg"></i>
                    </button>
                    <ul>
                        <a href="dashboard.html">
                            <li class="menu-links">
                                <img src="../Imagens/icon-dashboard.png" alt="">
                                <p>Dashboard</p>
                            </li>
                        </a>

                        <a href="marcacoes.html">
                            <li class="menu-links">
                                <img src="../Imagens/icon-marcacoes.png" alt="">
                                <p>Marcações</p>
                            </li>
                        </a>

                        <a href="resultados.html">
                            <li class="menu-links">
                                <img src="../Imagens/icon-resultados.png" alt="">
                                <p>Resultados</p>
                            </li>
                        </a>

                        <a href="dadosmedicos.html">
                            <li class="menu-links">
                                <img src="../Imagens/icon-dados-medicos.png" alt="">
                                <p>Dados Médicos</p>
                            </li>
                        </a>

                        <a href="marcarconsulta.html">
                            <li class="menu-links">
                                <img src="../Imagens/icon-marcarconsulta.png" alt="">
                                <p>Marcar Consulta</p>
                            </li>
                        </a>

                        <a href="contactar.html">
                            <li class="menu-links active">
                                <img src="../Imagens/icon-contactar.png" alt="">
                                <p>FAQ</p>
                            </li>
                        </a>
                        <a href="sincronizar.html">
                            <li class="menu-links">
                                <img src="../Imagens/icon-sync.png" alt="">
                                <p>Sincronizar</p>
                            </li>
                        </a>
                        <a href="definicoes.html">
                            <li class="menu-links">
                                <img src="../Imagens/icon-definicoes.png" alt="">
                                <p>Definições</p>
                            </li>
                        </a>
                    </ul>
                </div>
                <div class="btn-sair" id="btn-sair">
                    <a href="../index.html">
                        <p class="sair">Sair</p>
                    </a>
                </div>
            </div>

            <div class="direita">
                <div id="conteudo" class="conteudo">
                    <h1>Perguntas frequentes</h1>
                    <h2>Qual é a sua duvida ?</h2>

                    <div class="lista-motivos">
                        <div id="box1" class="box">
                            <button onclick="carregarPaginaDeContacto('contactar-motivo1')">
                                <p>Os meus batimentos cardíacos aparecem muito altos. O que significa?</p>
                                <img src="../Imagens/icon-setaD.png" alt="">
                            </button>
                        </div>
                        <div id="box2" class="box">
                            <button onclick="carregarPaginaDeContacto('contactar-motivo2')">
                                <p>A temperatura corporal apresentada parece incorreta.</p>
                                <img src="../Imagens/icon-setaD.png" alt="">
                            </button>
                        </div>
                        <div id="box3" class="box">
                            <button onclick="carregarPaginaDeContacto('contactar-motivo3')">
                                <p>O sistema não está a sincronizar os dados corretamente.</p>
                                <img src="../Imagens/icon-setaD.png" alt="">
                            </button>
                        </div>
                        <div id="box4" class="box">
                            <button onclick="carregarPaginaDeContacto('contactar-motivo4')">
                                <p>Os meus resultados mudam muito entre uma medição e outra.</p>
                                <img src="../Imagens/icon-setaD.png" alt="">
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <script>

            (async function () {
                try {
                    const resp = await fetch(API_BASE_URL + '/users/me', { credentials: 'include' });
                    if (!resp.ok) { window.location.href = '../index.html'; return; }
                    const dados = await resp.json();

                } catch (erro) {
                    window.location.href = '../index.html';
                }
            })();

            document.getElementById('btn-sair').addEventListener('click', async function (e) {
                e.preventDefault();
                try {
                    await fetch(API_BASE_URL + '/users/logout', {
                        method: 'POST',
                        credentials: 'include'
                    });
                } catch (erro) {
                }
                window.location.href = '../index.html';
            });

            // Menu lateral (fullscreen): bloqueia o scroll do fundo enquanto esta aberto
            function abrirMenu() {
                document.getElementById("menuLateral").classList.add("aberto");
                document.getElementById("menuOverlay").classList.add("aberto");
                document.body.style.overflow = "hidden";
            }

            function fecharMenu() {
                document.getElementById("menuLateral").classList.remove("aberto");
                document.getElementById("menuOverlay").classList.remove("aberto");
                document.body.style.overflow = "";
            }
        </script>
        <script src="../js/app.js"></script>
    </body>
</html>

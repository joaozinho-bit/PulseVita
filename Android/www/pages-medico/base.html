<!DOCTYPE html>
<html lang="pt-PT">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/x-icon" href="../Imagens/Icon app.png">
        <!-- CSS -->
        <link rel="stylesheet" href="../css-medicos/base.css">
        <link rel="stylesheet" href="../css/toast.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <title>Gestao dos pacientes</title>
      <script src="../js/config.js"></script>
</head>
    <body>
        <aside>
            <!-- Logo -->
            <img class="logo" src="../Imagens/Logo-Clara.png" alt="logo">

            <!-- Links -->
            <div class="links">
                <button onclick="abrirLinks('calendario')">
                    <img src="../Imagens/icon-calendario.png" alt="">
                    <p>Calendario</p>
                </button>
                <button onclick="abrirLinks('marcacoesMedico')">
                    <img src="../Imagens/icon-marcacoesMedicos.png" alt="">
                    <p>Marcacoes</p>
                </button>
                <button onclick="abrirLinks('pacientes')">
                    <img src="../Imagens/icon-pacientes.png" alt="">
                    <p>Pacientes</p>
                </button>
            </div>
            
            <div class="group">
                <!-- Logout -->
                <div class="logout">
                    <a href="login.html">Sair</a>
                </div>

                <!-- Linha separadora -->
                <div class="linha-separadora"></div>

                <!-- Perfil -->
                <div class="profile">
                    <img class="img-user" src="../Imagens/user-claro.png" alt="Imagem de perfil">
                    <span>Pedro Silva</span>
                    <img class="point" src="../Imagens/PontoVerde.png" alt="">
                </div>
            </div>
        </aside>

        <main>
            <div id="conteudo" class="conteudo">

                <!-- O conteúdo das páginas será carregado aqui -->
                 
            </div>
        </main>
    </body>
    <script>
    (async function () {
    try {
        const resp = await fetch(API_BASE_URL + '/medicos/me', { credentials: 'include' });
        if (!resp.ok) { window.location.href = 'login.html'; return; }
        const medicoAtual = await resp.json();
        document.querySelector('.profile span').textContent = medicoAtual.nome;
    } catch (erro) {
        window.location.href = 'login.html';
    }
})();
</script>
    <script src="../js/toast.js"></script>
    <script src="../js/appMedicos.js"></script>
    <script src="../js/calendarioMedico.js"></script>
    <script src="../js/marcacoesMedico.js"></script>
    <script src="../js/pacientes.js"></script>
</html>

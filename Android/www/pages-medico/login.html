<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../../Imagens/Icon app.png">
  <link rel="stylesheet" href="../css-medicos/login.css"> 
  <title>Iniciar sessão</title>
</head>
<body>
  <header>
    <img src="../../Imagens/Logo-Clara.png" alt="Logo" class="logo">
  </header>

  <main>
    <div class="cartao">
        <h1>Passe seu cartão</h1>
        <p>Medico <span><img src="../../Imagens/PontoVerde.png"></span>Acesso seguro</p>
        <img class="card" src="../../Imagens/CartaoDoMedico2.png" alt="Médico" class="medico">
    </div>

    <div class="ou">
      <div class="linha"></div>
      <div class="txt">ou</div>
      <div class="linha"></div>
    </div>

    <div class="input">
      <div class="num-medico">
        <p>Número de Medico</p>
        <input type="text" id="cartao-input" placeholder="000000000">
      </div>
      
      <div class="senha">
        <p>Senha</p>
        <input type="password" id="senha-input" placeholder="********">
      </div>

      <div class="entrar">
        <button id="btn-entrar-medico">Entrar</button>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('btn-entrar-medico').addEventListener('click', async function () {
        const numeroMedico = document.getElementById('cartao-input').value.trim();
        const senha = document.getElementById('senha-input').value;
 
        if (!numeroMedico || !senha) {
            alert("Preenche o número de médico e a senha.");
            return;
        }
 
        try {
            const resposta = await fetch('http://localhost:8080/medicos/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ numero_medico: numeroMedico, password: senha })
            });
 
            if (resposta.ok) {
                const dados = await resposta.json();
                localStorage.setItem('medico', JSON.stringify(dados));
                window.location.href = 'base.html';
            } else {
                alert("Número de médico ou senha incorretos!");
            }
        } catch (erro) {
            alert("Não foi possível contactar o servidor.");
        }
    });
  </script>
</body>
</html>
